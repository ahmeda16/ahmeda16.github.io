- id: hydrogen-wavefunction
  title: "Hydrogen Wavefunction Visualizer"
  organization: "Personal"
  date: "Aug 2023"
  description: "Physics visualization project that computes hydrogen atom wavefunctions from quantum numbers n, l, and m_l, then plots real, imaginary, and probability-density contours."
  url: "https://github.com/ahmeda16/hydrogen-wavefunction"
  image: "hydrogen-wavefunction.png"
  images:
    - "hydrogen-wavefunction.png"
    - "hydrogen-wavefunction-real.png"
    - "hydrogen-wavefunction-complex.png"
  role: "Personal physics/programming project"
  stack:
    - "Python 3.11"
    - "NumPy"
    - "SciPy"
    - "Matplotlib"
    - "Jupyter Notebook"
  highlights:
    - "The goal was to make the hydrogen wavefunction feel less abstract by turning the quantum numbers n, l, and m_l into actual shapes."
    - "The code computes the radial term with generalized Laguerre polynomials and Bohr-radius scaling, then combines it with the angular spherical-harmonic term from associated Legendre polynomials."
    - "The plots show the real component, imaginary component, and |psi|^2 probability density, which makes it easier to see how the math changes the orbital structure."
  links:
    - label: "GitHub repo"
      url: "https://github.com/ahmeda16/hydrogen-wavefunction"
  video:

- id: lorentz-attractor
  title: "Lorenz Attractor"
  organization: "Personal"
  date: "Aug 2023"
  description: "SciPy ODE simulation of the Lorenz system showing how tiny perturbations in initial conditions split into visibly different chaotic trajectories."
  url: "https://github.com/ahmeda16/lorentz-attractor"
  image: "lorentz-attractor.png"
  images:
    - "lorentz-attractor.png"
  role: "Personal math/programming project"
  stack:
    - "Python"
    - "NumPy"
    - "SciPy solve_ivp"
    - "Matplotlib"
    - "FuncAnimation"
  highlights:
    - "This is a compact way to see chaos directly: ten trajectories start almost on top of each other and then visibly separate."
    - "The simulation uses SciPy's solve_ivp on the classic Lorenz parameters sigma=10, rho=28, and beta=8/3 over t=0..50."
    - "The Matplotlib animation keeps the 3D axes fixed on a dark scene, so the sensitive dependence on the 1e-4 initial perturbations is easy to follow."
  links:
    - label: "GitHub repo"
      url: "https://github.com/ahmeda16/lorentz-attractor"
  video:

- id: cdh-tsat6-camera-driver
  title: "CDH-TSAT6 piCAM Camera Driver"
  organization: "UMSATS"
  date: "May 2023"
  description: "STM32L4 camera driver work for TSAT-6's Command and Data Handling subsystem, bringing up the SkyFox Labs piCAM over UART, receiving image data with DMA, and converting the camera's ASCII payload into JPEG bytes."
  url: "https://github.com/UMSATS/cdh-tsat"
  image: "tsat6-magellan-cleanroom.jpg"
  images:
    - "tsat6-magellan-cleanroom.jpg"
    - "tsat6-picam-team-capture.jpg"
    - "picam-1.png"
  role: "UMSATS TSAT-6 CDH lead"
  stack:
    - "C"
    - "STM32CubeIDE"
    - "STM32 HAL"
    - "UART4"
    - "DMA"
    - "STM32L452RE"
    - "piCAM"
  highlights:
    - "The camera driver files started in March 2023 and reached board-level TSAT-6 integration by late May, with the final boardV1 commit unit-tested in the CDH repo."
    - "The driver handled the piCAM boot sequence, including temporarily disabling UART4 and controlling the ON/RX/TX lines so the camera did not bootstrap into the wrong state during power-up."
    - "For image capture, the code received fixed-length piCAM sentences through UART DMA, watched for the FACE terminator, then converted the ASCII hex payload into binary JPEG data in the static image buffer."
  links:
    - label: "GitHub repo"
      url: "https://github.com/UMSATS/cdh-tsat"
  video:
