- id: robotic-arm-color-sorter
  title: "Robotic Arm Color Sorter"
  organization: "Course"
  date: "Apr 2026"
  description: "ECE 4180 Introduction to Robotics project: a vision-guided robotic arm that detected colored cubes, calibrated workspace coordinates, and sorted blocks using camera feedback and arm control."
  url:
  image: "robotic-arm-color-sorter-arm.jpg"
  images:
    - "robotic-arm-color-sorter-arm.jpg"
    - "robotic-arm-color-sorter-team.jpg"
    - "robotic-arm-color-sorter.png"
  role: "Robotics course project contributor"
  stack:
    - "Computer vision"
    - "Camera calibration"
    - "Robotic arm control"
    - "Workspace mapping"
    - "Python"
  highlights:
    - "This was a very physical project: the camera view had to line up with the arm's coordinate frame closely enough that a color detection result could become a real pick target."
    - "Most of the useful debugging happened at the boundary between software and hardware, tuning lighting, workspace calibration, and motion assumptions until the arm behaved consistently."
    - "The final demo tied together the vision pipeline, coordinate conversion, and arm commands so the system could identify colored cubes and sort them on the table."
