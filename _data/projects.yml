- id: stuart
  title: "Stuart: The Smart Micromouse Maze Solver"
  organization: "Course"
  date: "Mar 2026"
  description: "ECE 4600 Capstone Project: a PCB-based micromouse with deterministic maze exploration and a PPO reinforcement learning policy trained to minimize traversal time."
  url:
  image: "stuart-1.jpg"
  images:
    - "stuart-1.jpg"
  role: "Personal robotics and reinforcement learning project"
  stack:
    - "PCB design"
    - "Embedded systems"
    - "Maze solving"
    - "PPO"
    - "Reinforcement learning"
  highlights:
    - "Stuart treats micromouse as both an embedded systems project and a learning problem, starting from a compact PCB-based robot rather than only a simulator."
    - "The deterministic maze solver gives the robot a reliable exploration baseline, which matters because the learned policy still needs clean state information."
    - "The PPO side focuses on traversal time. Once the maze is known, the policy can try faster routes and control choices while still building on the classical solver."
