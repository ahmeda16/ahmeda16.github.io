- id: cec-2024-app
  title: "Hector Analysis: CEC 2024 Programming"
  organization: "Canadian Engineering Competition"
  date: "Mar 2024"
  description: "Team Hector's eight-hour CEC 2024 programming entry: a Python/Tkinter tool for planning two offshore drilling rigs across 30 days of map data while balancing resource extraction against preservation impact."
  url: "https://github.com/ahmeda16/cec-2024-programming-competition"
  image: "cec2024.jpeg"
  images:
    - "cec2024.jpeg"
    - "cec-2024-interface.png"
    - "cec-2024-heatmaps.png"
    - "cec-2024-mutation.png"
  role: "Team Hector contributor"
  stack:
    - "Python 3.11"
    - "Tkinter"
    - "NumPy"
    - "Matplotlib"
    - "CSV time-series data"
  highlights:
    - "The core challenge was making an eight-hour competition solution that could be inspected quickly. The Tkinter interface put the day slider, preservation choice, rig coordinates, collection totals, and map view in one place."
    - "Behind the interface, the data pipeline read 100x100 CSV maps across 30 days and normalized ocean cells while treating land as invalid for rig movement."
    - "The route optimizer was framed as a genetic algorithm, where an individual represented two 30-day rig paths and the fitness score balanced oil, metal, and helium gain against preservation damage."
  links:
    - label: "GitHub repo"
      url: "https://github.com/ahmeda16/cec-2024-programming-competition"
  video:

